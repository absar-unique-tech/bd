<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cart - ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5;padding-bottom:160px}
.header{background:#ff6b00;color:#fff;padding:15px;display:flex;align-items:center;gap:15px;position:sticky;top:0;z-index:100}
.back{color:#fff;text-decoration:none;font-size:24px}
.items{padding:15px}
.item{background:#fff;border-radius:8px;padding:15px;margin-bottom:10px;display:flex;gap:15px}
.item img{width:80px;height:80px;object-fit:cover;border-radius:6px}
.item-info{flex:1}
.item-name{font-weight:600;margin-bottom:5px;font-size:14px}
.item-price{color:#ff6b00;font-weight:700;margin-bottom:8px}
.item-color{font-size:12px;color:#666;margin-bottom:8px}
.item-controls{display:flex;justify-content:space-between;align-items:center}
.qty{display:flex;align-items:center;gap:10px}
.qty button{width:28px;height:28px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer;font-size:16px}
.qty span{font-weight:600;min-width:20px;text-align:center}
.remove{color:#ff3b30;font-size:14px;cursor:pointer;font-weight:600}
.empty{text-align:center;padding:60px 20px}
.empty h2{color:#999;margin-bottom:10px}
.empty a{color:#ff6b00;text-decoration:none;font-weight:600;display:inline-block;margin-top:15px}
.checkout{position:fixed;bottom:60px;left:0;right:0;background:#fff;padding:15px;box-shadow:0 -2px 10px rgba(0,0,0,.1)}
.total{display:flex;justify-content:space-between;margin-bottom:15px;font-size:18px;font-weight:700}
.btn-order{width:100%;background:#ff6b00;color:#fff;border:0;padding:15px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.btn-order:disabled{background:#ccc}
.btn-order:active{opacity:.8}
.customer{padding:15px;background:#fff;margin:15px;border-radius:8px}
.customer h3{margin-bottom:15px;font-size:16px}
.customer input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px;font-size:14px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:10px 0}
.nav-item{text-decoration:none;color:#666;font-size:12px;text-align:center}
.nav-item.active{color:#ff6b00}
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="back">←</a>
<h3>Shopping Cart</h3>
</div>

<div class="items" id="items"></div>

<div class="customer" id="customer" style="display:none">
<h3>Customer Info</h3>
<input type="text" id="cName" placeholder="Your Name *" required>
<input type="tel" id="cPhone" placeholder="Phone Number *" required>
<input type="text" id="cAddr" placeholder="Delivery Address *" required>
</div>

<div class="checkout" id="checkout" style="display:none">
<div class="total">
<span>Total:</span>
<span id="total">৳0</span>
</div>
<button class="btn-order" id="btnOrder" onclick="placeOrder()">Place Order via WhatsApp</button>
</div>

<div class="bottom-nav">
<a href="index.html" class="nav-item">🏠<br>Home</a>
<a href="cart.html" class="nav-item active">🛒<br>Cart</a>
<a href="login.html" class="nav-item">👤<br>Account</a>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCI39dQTYcZ76ROxUY73jYB3OZPfjsyegI",
  authDomain: "absar-unique-tech.firebaseapp.com",
  projectId: "absar-unique-tech",
  storageBucket: "absar-unique-tech.firebasestorage.app",
  messagingSenderId: "576285730220",
  appId: "1:576285730220:web:1d3cdf9cf3ddc4e00b4609"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let cart = [];

function loadCart(){
  cart = JSON.parse(localStorage.getItem('cart')||'[]');
  renderCart();
}

function renderCart(){
  const items = document.getElementById('items');
  const customer = document.getElementById('customer');
  const checkout = document.getElementById('checkout');

  if(cart.length === 0){
    items.innerHTML = '<div class="empty"><h2>Cart is Empty</h2><p>Add some products to continue</p><a href="index.html">Continue Shopping</a></div>';
    customer.style.display = 'none';
    checkout.style.display = 'none';
    return;
  }

  customer.style.display = 'block';
  checkout.style.display = 'block';

  items.innerHTML = cart.map((item,idx)=>`
    <div class="item">
      <img src="${item.image}" alt="${item.name}">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">৳${item.price}</div>
        ${item.color?`<div class="item-color">Color: ${item.color}</div>`:''}
        <div class="item-controls">
          <div class="qty">
            <button onclick="changeQty(${idx},-1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${idx},1)">+</button>
          </div>
          <div class="remove" onclick="removeItem(${idx})">Remove</div>
        </div>
      </div>
    </div>
  `).join('');

  updateTotal();
}

window.changeQty = function(idx,delta){
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

window.removeItem = function(idx){
  if(confirm('Remove this item?')){
    cart.splice(idx,1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }
}

function updateTotal(){
  const total = cart.reduce((sum,item)=>sum+item.price*item.qty,0);
  document.getElementById('total').textContent = '৳' + total;
}

window.placeOrder = async function(){
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const addr = document.getElementById('cAddr').value.trim();

  if(!name||!phone||!addr){
    alert('Please fill all customer info fields');
    return;
  }

  const btn = document.getElementById('btnOrder');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  try {
    const order = {
      customer: {name, phone, address: addr},
      items: cart,
      total: cart.reduce((sum,item)=>sum+item.price*item.qty,0),
      status: 'pending',
      createdAt: new Date().toISOString()
    };

    await addDoc(collection(db, "orders"), order);

    const msg = `*New Order from ABSAR UNIQUE TECH*%0A%0A*Customer:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${addr}%0A%0A*Items:*%0A${cart.map(i=>`${i.name} (${i.color||'N/A'}) x${i.qty} - ৳${i.price*i.qty}`).join('%0A')}%0A%0A*Total: ৳${order.total}*%0A%0AThank you!`;
    window.open(`https://wa.me/8801874583354?text=${msg}`, '_blank');

    localStorage.removeItem('cart');
    alert('Order placed successfully! Check WhatsApp.');
    window.location.href = 'index.html';
  } catch(e){
    console.error(e);
    alert('Error placing order. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Place Order via WhatsApp';
  }
}

loadCart();
</script>
</body>
</html>
