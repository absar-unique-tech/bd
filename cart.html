<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - ABSAR UNIQUE TECH</title>
  <link rel="icon" href="logo.jpg">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
    :root{--primary:#ff6b00;--text:#333;--border:#e5e5e5}
    body{background:#f5f5f5;color:var(--text);padding-bottom:70px}
   .header{position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid var(--border);padding:15px;text-align:center;font-weight:700}
   .empty{text-align:center;padding:60px 20px;background:#fff;margin:20px;border-radius:10px}
   .empty-icon{font-size:60px;margin-bottom:20px}
   .btn{background:var(--primary);color:#fff;border:none;padding:12px 30px;border-radius:5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;margin-top:15px}
   .cart-item{background:#fff;margin:10px 15px;padding:15px;border-radius:10px;display:flex;gap:15px}
   .cart-item img{width:80px;height:80px;object-fit:contain;border:1px solid var(--border);border-radius:5px}
   .item-info{flex:1}
   .item-name{font-weight:600;margin-bottom:5px}
   .item-price{color:var(--primary);font-weight:700;margin-bottom:10px}
   .item-controls{display:flex;align-items:center;gap:10px}
   .qty-box{display:flex;align-items:center;border:1px solid var(--border);border-radius:5px}
   .qty-box button{width:30px;height:30px;background:none;border:none;cursor:pointer}
   .qty-box span{width:40px;text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}
   .remove{color:#ff0000;cursor:pointer;font-size:13px}
   .summary{background:#fff;margin:15px;padding:20px;border-radius:10px}
   .sum-row{display:flex;justify-content:space-between;margin-bottom:10px}
   .total{font-size:20px;font-weight:700;color:var(--primary);border-top:2px solid var(--border);padding-top:15px}
   .checkout-btn{width:100%;background:var(--primary);color:#fff;border:none;padding:15px;border-radius:5px;font-weight:700;font-size:16px;cursor:pointer;margin-top:15px}
   .bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;z-index:1000}
   .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#666;font-size:11px}
   .nav-item.active{color:var(--primary)}
   .nav-icon{font-size:22px;margin-bottom:3px}
  </style>
</head>
<body>
  <header class="header">Shopping Cart</header>
  <main id="cartContainer"></main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Shop</span></a>
    <a href="#" class="nav-item"><span class="nav-icon">♡</span><span>Wishlist</span></a>
    <a href="cart.html" class="nav-item active"><span class="nav-icon">🛒</span><span>Cart</span></a>
    <a href="login.html" class="nav-item"><span class="nav-icon">👤</span><span>Account</span></a>
  </nav>
  <script src="cart.js"></script>
</body>
</html>
