<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cart - ABSAR UNIQUE TECH</title>
<style>
:root{--primary:#ff6b00;--dark:#1a1a1a;--gray:#f5f5f5}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:var(--gray)}
.header{background:linear-gradient(135deg,var(--primary),#ff8533);color:#fff;padding:15px;text-align:center;font-size:18px;font-weight:700;position:sticky;top:0;z-index:100}
.container{padding:15px;padding-bottom:120px}
.cart-item{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;display:flex;gap:12px}
.cart-item img{width:80px;height:80px;object-fit:cover;border-radius:8px}
.item-info{flex:1}
.item-name{font-weight:600;margin-bottom:5px}
.item-price{color:var(--primary);font-weight:800;font-size:16px}
.item-color{font-size:12px;color:#666;margin:5px 0}
.qty-control{display:flex;align-items:center;gap:10px;margin-top:10px}
.qty-btn{background:var(--primary);color:#fff;border:none;width:30px;height:30px;border-radius:6px;font-size:18px;cursor:pointer}
.qty-btn:disabled{background:#ccc}
.qty-num{font-weight:700;min-width:30px;text-align:center}
.remove-btn{background:#ff3b30;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;margin-top:8px}
.empty{text-align:center;padding:60px 20px;color:#666}
.total-box{background:#fff;padding:20px;border-radius:12px;position:fixed;bottom:0;left:0;right:0;box-shadow:0 -2px 10px rgba(0,0,0,.1)}
.total-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:16px}
.total-row.final{font-weight:800;font-size:20px;color:var(--primary);border-top:2px dashed #ddd;padding-top:10px}
.checkout-btn{background:var(--primary);color:#fff;padding:16px;border:none;border-radius:8px;width:100%;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.checkout-btn:disabled{background:#ccc}
.back-btn{position:fixed;bottom:90px;left:15px;right:15px;background:#fff;color:var(--primary);padding:12px;border:2px solid var(--primary);border-radius:8px;font-weight:700;text-align:center;text-decoration:none}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:15px}
.modal.active{display:flex}
.order-form{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.order-form h3{margin-bottom:15px;color:#ff6b00;font-size:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:14px}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:15px}
.delivery-box{border:2px solid #eee;border-radius:8px;padding:12px;margin-bottom:15px}
.radio-row{display:flex;align-items:center;margin-bottom:10px;cursor:pointer}
.radio-row input{width:auto;margin-right:10px}
.confirm-btn{background:#ff6b00;color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-size:16px;font-weight:700;cursor:pointer}
.close-btn{background:#eee;color:#333;padding:12px;border:none;border-radius:8px;width:100%;font-size:15px;margin-top:10px;cursor:pointer}
</style>
</head>
<body>
<div class="header">🛒 My Cart</div>
<div class="container" id="cartList"></div>
<a href="index.html" class="back-btn">← Continue Shopping</a>

<div class="total-box" id="totalBox" style="display:none">
<div class="total-row">
<span>Subtotal:</span>
<span id="subtotal">0 TK</span>
</div>
<div class="total-row final">
<span>Total:</span>
<span id="total">0 TK</span>
</div>
<button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
</div>

<div class="modal" id="checkoutModal">
<div class="order-form">
<h3>অর্ডার কনফার্ম করুন</h3>
<div class="form-group">
<label>আপনার নাম *</label>
<input type="text" id="orderName" placeholder="পুরো নাম লিখুন">
</div>
<div class="form-group">
<label>মোবাইল নাম্বার *</label>
<input type="tel" id="orderPhone" placeholder="01XXXXXXXXX">
</div>
<div class="form-group">
<label>সম্পূর্ণ ঠিকানা *</label>
<input type="text" id="orderAddress" placeholder="বাসা, রোড, এলাকা, জেলা">
</div>
<div class="delivery-box">
<label style="font-weight:700;margin-bottom:10px;display:block">ডেলিভারি এরিয়া *</label>
<label class="radio-row">
<input type="radio" name="delivery" value="80" onchange="updateTotal()">
ঢাকার ভিতরে - 80 টাকা
</label>
<label class="radio-row">
<input type="radio" name="delivery" value="150" onchange="updateTotal()">
ঢাকার বাইরে - 150 টাকা
</label>
</div>
<div class="delivery-box">
<label style="font-weight:700;margin-bottom:10px;display:block">পেমেন্ট মেথড *</label>
<label class="radio-row">
<input type="radio" name="payment" value="Cash on Delivery" onchange="showPaymentInfo()">
💵 ক্যাশ অন ডেলিভারি
</label>
<label class="radio-row">
<input type="radio" name="payment" value="bKash" onchange="showPaymentInfo()">
📱 বিকাশ
</label>
<label class="radio-row">
<input type="radio" name="payment" value="Nagad" onchange="showPaymentInfo()">
📱 নগদ
</label>
</div>
<div id="paymentInfo" style="display:none;margin-bottom:15px"></div>
<div class="form-group">
<label>Transaction ID (bKash/Nagad এর জন্য)</label>
<input type="text" id="transactionId" placeholder="TrxID লিখুন">
</div>
<div class="total-box" style="position:static;box-shadow:none;padding:15px;background:#fff3e6">
<div class="total-row">
<span>Products:</span>
<span id="checkoutSubtotal">0 TK</span>
</div>
<div class="total-row">
<span>Delivery:</span>
<span id="checkoutDelivery">0 TK</span>
</div>
<div class="total-row final">
<span>Total:</span>
<span id="checkoutTotal">0 TK</span>
</div>
</div>
<button class="confirm-btn" onclick="submitOrder()">অর্ডার কনফার্ম করুন</button>
<button class="close-btn" onclick="closeModal()">বাতিল</button>
</div>
</div>

<script>
var cart = JSON.parse(localStorage.getItem('cart')) || [];

function renderCart(){
  var cartList = document.getElementById('cartList');
  var totalBox = document.getElementById('totalBox');

  if(cart.length === 0){
    cartList.innerHTML = '<div class="empty">আপনার কার্ট খালি<br><br><a href="index.html" style="color:#ff6b00">প্রোডাক্ট কিনুন</a></div>';
    totalBox.style.display = 'none';
    return;
  }

  var html = '';
  var subtotal = 0;

  for(var i=0;i<cart.length;i++){
    var item = cart[i];
    var itemTotal = parseInt(item.price) * item.qty;
    subtotal += itemTotal;

    html += '<div class="cart-item"><img src="'+item.img+'" alt="'+item.name+'" onerror="this.src=\'https://via.placeholder.com/80\'"><div class="item-info"><div class="item-name">'+item.name+'</div><div class="item-color">Color: '+(item.color||'N/A')+'</div><div class="item-price">৳'+item.price+' x '+item.qty+' = ৳'+itemTotal+'</div><div class="qty-control"><button class="qty-btn" onclick="updateQty('+i+',-1)" '+(item.qty<=1?'disabled':'')+'>-</button><span class="qty-num">'+item.qty+'</span><button class="qty-btn" onclick="updateQty('+i+',1)">+</button></div><button class="remove-btn" onclick="removeItem('+i+')">Remove</button></div></div>';
  }

  cartList.innerHTML = html;
  document.getElementById('subtotal').textContent = subtotal + ' TK';
  document.getElementById('total').textContent = subtotal + ' TK';
  totalBox.style.display = 'block';
}

function updateQty(index, change){
  cart[index].qty += change;
  if(cart[index].qty < 1) cart[index].qty = 1;
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function removeItem(index){
  if(!confirm('এই আইটেম Delete করবেন?')) return;
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function openCheckout(){
  var subtotal = 0;
  for(var i=0;i<cart.length;i++){
    subtotal += parseInt(cart[i].price) * cart[i].qty;
  }
  document.getElementById('checkoutSubtotal').textContent = subtotal + ' TK';
  document.getElementById('checkoutTotal').textContent = subtotal + ' TK';
  document.getElementById('checkoutDelivery').textContent = '0 TK';
  document.getElementById('checkoutModal').classList.add('active');
}

function updateTotal(){
  var subtotal = 0;
  for(var i=0;i<cart.length;i++){
    subtotal += parseInt(cart[i].price) * cart[i].qty;
  }
  var delivery = document.querySelector('input[name="delivery"]:checked');
  var charge = delivery? parseInt(delivery.value) : 0;
  document.getElementById('checkoutDelivery').textContent = charge + ' TK';
  document.getElementById('checkoutTotal').textContent = (subtotal + charge) + ' TK';
}

function showPaymentInfo(){
  var payment = document.querySelector('input[name="payment"]:checked');
  var infoBox = document.getElementById('paymentInfo');

  if(payment && payment.value!== 'Cash on Delivery'){
    infoBox.style.display = 'block';
    infoBox.innerHTML = '<div style="background:#e3f2fd;padding:12px;border-radius:8px;border:2px solid #2196f3"><div style="font-weight:700;color:#1976d2;margin-bottom:8px">💳 '+payment.value+' নাম্বার:</div><div style="font-size:20px;font-weight:800;color:#0d47a1;text-align:center;margin:8px 0">01955379242</div><div style="font-size:12px;color:#555;text-align:center">এই নাম্বারে Send Money করুন এবং Transaction ID অর্ডারের সময় দিবেন</div></div>';
  } else {
    infoBox.style.display = 'none';
  }
}

function closeModal(){
  document.getElementById('checkoutModal').classList.remove('active');
  document.getElementById('orderName').value = '';
  document.getElementById('orderPhone').value = '';
  document.getElementById('orderAddress').value = '';
  document.getElementById('transactionId').value = '';
  var radios = document.querySelectorAll('input[name="delivery"]');
  for(var i=0;i<radios.length;i++) radios[i].checked = false;
  radios = document.querySelectorAll('input[name="payment"]');
  for(var i=0;i<radios.length;i++) radios[i].checked = false;
  document.getElementById('paymentInfo').style.display = 'none';
}

function submitOrder(){
  var name = document.getElementById('orderName').value.trim();
  var phone = document.getElementById('orderPhone').value.trim();
  var address = document.getElementById('orderAddress').value.trim();
  var delivery = document.querySelector('input[name="delivery"]:checked');
  var payment = document.querySelector('input[name="payment"]:checked');
  var transactionId = document.getElementById('transactionId').value.trim();

  if(!name) return alert('নাম লিখুন!');
  if(!phone || phone.length < 11) return alert('সঠিক মোবাইল নাম্বার দিন!');
  if(!address) return alert('ঠিকানা লিখুন!');
  if(!delivery) return alert('ডেলিভারি এরিয়া সিলেক্ট করুন!');
  if(!payment) return alert('পেমেন্ট মেথড সিলেক্ট করুন!');

  if(payment.value!== 'Cash on Delivery' &&!transactionId){
    return alert('bKash/Nagad Transaction ID দিন!');
  }

  alert('✅ অর্ডার সফল!\n\nআমরা শীঘ্রই কল দিব।');
  localStorage.removeItem('cart');
  cart = [];
  closeModal();
  renderCart();
}

renderCart();
</script>
</body>
</html>
