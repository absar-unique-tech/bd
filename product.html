<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product - ABSAR UNIQUE TECH</title>
<!-- Firebase Compat - TV Compatible -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5}
.header{background:#ff6b00;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.back-btn{background:#fff;color:#ff6b00;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:20px;font-weight:700}
.icon{cursor:pointer;position:relative;text-decoration:none;color:#fff;font-size:24px}
.cart-count{position:absolute;top:-8px;right:-8px;background:#fff;color:#ff6b00;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;margin:0 auto;padding-bottom:100px}
.p-image{background:#fff;position:relative}
.slider{position:relative;width:100%;aspect-ratio:1/1;background:#000;overflow:hidden}
.track{display:flex;transition:transform.3s ease;height:100%}
.slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.slide img{width:100%;height:100%;object-fit:contain}
.slide iframe{width:100%;height:100%;border:none}
.nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:none;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;z-index:2}
.prev{left:10px}
.next{right:10px}
.dots{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer}
.dot.active{background:#fff;width:24px;border-radius:4px}
.soldout{position:absolute;top:15px;left:15px;background:#ff3b30;color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;z-index:3}
.brand-tag{position:absolute;top:15px;right:15px;background:rgba(0,0,0,.7);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;z-index:3}
.p-details{background:#fff;padding:20px;margin-bottom:15px}
.p-name{font-size:22px;font-weight:800;margin-bottom:10px}
.p-price{font-size:28px;font-weight:800;color:#ff6b00;margin-bottom:15px}
.stock-info{display:inline-block;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:700;margin-bottom:15px}
.stock-info.in{background:#e8f5e9;color:#4caf50}
.stock-info.low{background:#fff3e0;color:#ff9800}
.stock-info.out{background:#ffebee;color:#ff3b30}
.p-desc{color:#666;line-height:1.6;margin-bottom:15px}
.features{margin-bottom:15px}
.features h4{font-size:16px;margin-bottom:10px;color:#333}
.feature-list{display:flex;flex-wrap:wrap;gap:8px}
.feature-tag{background:#fff3e6;color:#ff6b00;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}
.color-select{margin-bottom:20px}
.color-select h4{font-size:16px;margin-bottom:10px;color:#333}
.color-options{display:flex;gap:10px;flex-wrap:wrap}
.color-btn{padding:8px 16px;border:2px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-weight:600}
.color-btn.active{border-color:#ff6b00;background:#fff3e6;color:#ff6b00}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:50;display:flex;gap:10px}
.buy-btn{flex:1;background:#ff6b00;color:#fff;padding:16px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.btn-cart{flex:1;background:#666;color:#fff;padding:16px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.buy-btn:disabled,.btn-cart:disabled{background:#ccc;cursor:not-allowed}
.loading{text-align:center;padding:60px;color:#666}
.error{text-align:center;padding:60px;color:#ff3b30}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:15px}
.modal.active{display:flex}
.order-form{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.order-form h3{margin-bottom:15px;color:#ff6b00;font-size:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:14px}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:15px}
.delivery-box{border:2px solid #eee;border-radius:8px;padding:12px;margin-bottom:15px}
.radio-row{display:flex;align-items:center;margin-bottom:10px;cursor:pointer}
.radio-row input{width:auto;margin-right:10px}
.total-box{background:#fff3e6;padding:15px;border-radius:8px;margin-bottom:15px}
.total-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:15px}
.total-row.final{font-weight:800;font-size:18px;color:#ff6b00;border-top:2px dashed #ddd;padding-top:8px}
.confirm-btn{background:#ff6b00;color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-size:16px;font-weight:700;cursor:pointer}
.close-btn{background:#eee;color:#333;padding:12px;border:none;border-radius:8px;width:100%;font-size:15px;margin-top:10px;cursor:pointer}
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="back-btn">←</a>
<div style="font-weight:800">Product Details</div>
<a href="cart.html" class="icon">🛒<span class="cart-count" id="cartCount">0</span></a>
</div>

<div class="container" id="container">
<div class="loading">Loading product...</div>
</div>

<div class="modal" id="orderModal">
<div class="order-form">
<h3>অর্ডার কনফার্ম করুন</h3>
<div class="form-group">
<label>প্রোডাক্ট:</label>
<input type="text" id="orderProduct" readonly>
</div>
<div class="form-group">
<label>Color:</label>
<input type="text" id="orderColor" readonly>
</div>
<div class="form-group">
<label>আপনার নাম *</label>
<input type="text" id="orderName" placeholder="পুরো নাম লিখুন">
</div>
<div class="form-group">
<label>মোবাইল নাম্বার *</label>
<input type="tel" id="orderPhone" placeholder="01XXXXXXXXX">
</div>
<div class="form-group">
<label>সম্পূর্ণ ঠিকানা *</label>
<input type="text" id="orderAddress" placeholder="বাসা, রোড, এলাকা, জেলা">
</div>
<div class="delivery-box">
<label style="font-weight:700;margin-bottom:10px;display:block">ডেলিভারি এরিয়া সিলেক্ট করুন *</label>
<label class="radio-row">
<input type="radio" name="delivery" value="80" onchange="updateTotal()">
ঢাকার ভিতরে - 80 টাকা
</label>
<label class="radio-row">
<input type="radio" name="delivery" value="150" onchange="updateTotal()">
ঢাকার বাইরে - 150 টাকা
</label>
</div>
<div class="delivery-box">
<label style="font-weight:700;margin-bottom:10px;display:block">পেমেন্ট মেথড সিলেক্ট করুন *</label>
<label class="radio-row">
<input type="radio" name="payment" value="Cash on Delivery" onchange="showPaymentInfo()">
💵 ক্যাশ অন ডেলিভারি
</label>
<label class="radio-row">
<input type="radio" name="payment" value="bKash" onchange="showPaymentInfo()">
📱 বিকাশ
</label>
<label class="radio-row">
<input type="radio" name="payment" value="Nagad" onchange="showPaymentInfo()">
📱 নগদ
</label>
</div>
<div id="paymentInfo" style="display:none;margin-bottom:15px"></div>
<div class="form-group">
<label>Transaction ID (bKash/Nagad এর জন্য) *</label>
<input type="text" id="transactionId" placeholder="TrxID লিখুন">
</div>
<div class="total-box">
<div class="total-row">
<span>প্রোডাক্ট মূল্য:</span>
<span id="productPrice">0 TK</span>
</div>
<div class="total-row">
<span>ডেলিভারি চার্জ:</span>
<span id="deliveryCharge">0 TK</span>
</div>
<div class="total-row final">
<span>সর্বমোট:</span>
<span id="totalAmount">0 TK</span>
</div>
</div>
<button class="confirm-btn" onclick="submitOrder()">অর্ডার কনফার্ম করুন</button>
<button class="close-btn" onclick="closeModal()">বাতিল</button>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyCI39dQTYcZ76ROxUY73jYB3OZPfjsyegI",
  authDomain: "absar-unique-tech.firebaseapp.com",
  databaseURL: "https://absar-unique-tech-default-rtdb.firebaseio.com",
  projectId: "absar-unique-tech",
  storageBucket: "absar-unique-tech.firebasestorage.app",
  messagingSenderId: "576285730220",
  appId: "1:576285730220:web:1d3cdf9cf3ddc4e00b4609"
};

firebase.initializeApp(firebaseConfig);
var database = firebase.database();

var product = null;
var selectedColor = '';
var currentPrice = 0;
var currentSlide = 0;
var allMedia = [];

var urlParams = new URLSearchParams(window.location.search);
var productId = urlParams.get('id');

function updateCartCount(){
  var cart = JSON.parse(localStorage.getItem('cart')) || [];
  var total = 0;
  for(var i=0;i<cart.length;i++) total += cart[i].qty;
  document.getElementById('cartCount').textContent = total;
}
updateCartCount();

function loadProduct(){
  if(!productId){
    document.getElementById('container').innerHTML = '<div class="error">Product ID পাওয়া যায়নি</div>';
    return;
  }

  database.ref('products/' + productId).once('value').then(function(snapshot){
    if(!snapshot.exists()){
      document.getElementById('container').innerHTML = '<div class="error">Error loading product<br>প্রোডাক্ট খুঁজে পাওয়া যায়নি</div>';
      return;
    }

    product = snapshot.val();
    product.id = productId;
    currentPrice = parseInt(product.price);
    selectedColor = product.color? product.color.split(',')[0].trim() : '';

    var imgString = product.images||'';
    allMedia = imgString.split('\n').map(function(i){return i.trim()}).filter(function(i){return i});
    if(allMedia.length===0) allMedia = ['https://via.placeholder.com/600x400?text=No+Image'];

    var stock = parseInt(product.stock||0);
    var stockClass = stock===0?'out':stock<10?'low':'in';
    var stockText = stock===0?'Out of Stock':stock<10?'Only '+stock+' left':stock+' in stock';
    var colors = product.color? product.color.split(',').map(function(c){return c.trim()}).filter(function(c){return c}) : [];
    var features = product.features? product.features.split(',').map(function(f){return f.trim()}).filter(function(f){return f}) : [];

    var html = '<div class="p-image"><div class="slider"><div class="track" id="track"></div><button class="nav-btn prev" onclick="prevSlide()" style="display:'+(allMedia.length > 1? 'block' : 'none')+'">‹</button><button class="nav-btn next" onclick="nextSlide()" style="display:'+(allMedia.length > 1? 'block' : 'none')+'">›</button><div class="dots" id="dots"></div></div>';
    if(stock===0) html += '<div class="soldout">SOLD OUT</div>';
    if(product.brand) html += '<div class="brand-tag">'+product.brand+'</div>';
    html += '</div><div class="p-details"><div class="p-name">'+product.name+'</div><div class="p-price">৳'+product.price+'</div><div class="stock-info '+stockClass+'">'+stockText+'</div>';
    if(product.description) html += '<div class="p-desc">'+product.description+'</div>';
    if(features.length > 0){
      html += '<div class="features"><h4>Key Features:</h4><div class="feature-list">';
      for(var i=0;i<features.length;i++) html += '<span class="feature-tag">'+features[i]+'</span>';
      html += '</div></div>';
    }
    if(colors.length > 0){
      html += '<div class="color-select"><h4>Select Color:</h4><div class="color-options">';
      for(var i=0;i<colors.length;i++) html += '<button class="color-btn '+(i===0?'active':'')+'" onclick="selectColor(\''+colors[i]+'\',this)">'+colors[i]+'</button>';
      html += '</div></div>';
    }
    if(product.details) html += '<div class="features"><h4>Product Details:</h4><p style="color:#666;line-height:1.6">'+product.details+'</p></div>';
    html += '</div><div class="bottom-bar"><button class="btn-cart" onclick="addToCart()" '+(stock===0? 'disabled' : '')+'>'+(stock===0? 'Out of Stock' : '🛒 Add to Cart')+'</button><button class="buy-btn" onclick="openOrderForm()" '+(stock===0? 'disabled' : '')+'>'+(stock===0? 'Out of Stock' : 'অর্ডার করুন')+'</button></div>';

    document.getElementById('container').innerHTML = html;
    initSlider();
  }).catch(function(e){
    console.error(e);
    document.getElementById('container').innerHTML = '<div class="error">Error loading product<br>দুঃখিত, সমস্যা হয়েছে</div>';
  });
}

function initSlider(){
  var track = document.getElementById('track');
  var dots = document.getElementById('dots');
  var trackHtml = '';
  var dotsHtml = '';

  for(var i=0;i<allMedia.length;i++){
    var url = allMedia[i];
    if(url.indexOf('youtube.com')!==-1 || url.indexOf('youtu.be')!==-1){
      var vid = '';
      if(url.indexOf('watch?v=')!==-1) vid = url.split('watch?v=')[1].split('&')[0];
      else if(url.indexOf('youtu.be/')!==-1) vid = url.split('youtu.be/')[1].split('?')[0];
      trackHtml += '<div class="slide"><iframe src="https://www.youtube.com/embed/'+vid+'" allowfullscreen></iframe></div>';
    } else {
      trackHtml += '<div class="slide"><img src="'+url+'" alt="'+product.name+'" onerror="this.src=\'https://via.placeholder.com/600x400?text=No+Image\'"></div>';
    }
    dotsHtml += '<div class="dot '+(i===0?'active':'')+'" onclick="goSlide('+i+')"></div>';
  }
  track.innerHTML = trackHtml;
  dots.innerHTML = dotsHtml;
}

function prevSlide(){
  currentSlide = (currentSlide - 1 + allMedia.length) % allMedia.length;
  updateSlider();
}

function nextSlide(){
  currentSlide = (currentSlide + 1) % allMedia.length;
  updateSlider();
}

function goSlide(i){
  currentSlide = i;
  updateSlider();
}

function updateSlider(){
  document.getElementById('track').style.transform = 'translateX(-'+(currentSlide * 100)+'%)';
  var dots = document.querySelectorAll('.dot');
  for(var i=0;i<dots.length;i++){
    if(i===currentSlide) dots[i].classList.add('active');
    else dots[i].classList.remove('active');
  }
}

function selectColor(color, btn){
  selectedColor = color;
  var btns = document.querySelectorAll('.color-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function addToCart(){
  var cart = JSON.parse(localStorage.getItem('cart')) || [];
  var exist = null;
  for(var i=0;i<cart.length;i++){
    if(cart[i].id === product.id && cart[i].color === selectedColor){
      exist = cart[i];
      break;
    }
  }

  if(exist){
    exist.qty += 1;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      img: allMedia[0] || 'https://via.placeholder.com/300',
      color: selectedColor || 'N/A',
      qty: 1
    });
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  alert('✅ কার্টে যোগ হইছে!\n\n' + product.name + '\nColor: ' + (selectedColor || 'N/A'));
}

function openOrderForm(){
  document.getElementById('orderProduct').value = product.name;
  document.getElementById('orderColor').value = selectedColor || 'N/A';
  document.getElementById('productPrice').textContent = currentPrice + ' TK';
  document.getElementById('orderModal').classList.add('active');
  document.getElementById('deliveryCharge').textContent = '0 TK';
  document.getElementById('totalAmount').textContent = currentPrice + ' TK';
  var radios = document.querySelectorAll('input[name="delivery"]');
  for(var i=0;i<radios.length;i++) radios[i].checked = false;
  radios = document.querySelectorAll('input[name="payment"]');
  for(var i=0;i<radios.length;i++) radios[i].checked = false;
  document.getElementById('paymentInfo').style.display = 'none';
}

function updateTotal(){
  var delivery = document.querySelector('input[name="delivery"]:checked');
  var charge = delivery? parseInt(delivery.value) : 0;
  document.getElementById('deliveryCharge').textContent = charge + ' TK';
  document.getElementById('totalAmount').textContent = (currentPrice + charge) + ' TK';
}

function showPaymentInfo(){
  var payment = document.querySelector('input[name="payment"]:checked');
  var infoBox = document.getElementById('paymentInfo');

  if(payment && payment.value!== 'Cash on Delivery'){
    infoBox.style.display = 'block';
    infoBox.innerHTML = '<div style="background:#e3f2fd;padding:12px;border-radius:8px;border:2px solid #2196f3"><div style="font-weight:700;color:#1976d2;margin-bottom:8px">💳 '+payment.value+' নাম্বার:</div><div style="font-size:20px;font-weight:800;color:#0d47a1;text-align:center;margin:8px 0">01955379242</div><div style="font-size:12px;color:#555;text-align:center">এই নাম্বারে Send Money করুন এবং Transaction ID অর্ডারের সময় দিবেন</div></div>';
  } else {
    infoBox.style.display = 'none';
  }
}

function closeModal(){
  document.getElementById('orderModal').classList.remove('active');
  document.getElementById('orderName').value = '';
  document.getElementById('orderPhone').value = '';
  document.getElementById('orderAddress').value = '';
  document.getElementById('transactionId').value = '';
}

function submitOrder(){
  var name = document.getElementById('orderName').value.trim();
  var phone = document.getElementById('orderPhone').value.trim();
  var address = document.getElementById('orderAddress').value.trim();
  var delivery = document.querySelector('input[name="delivery"]:checked');
  var payment = document.querySelector('input[name="payment"]:checked');
  var transactionId = document.getElementById('transactionId').value.trim();

  if(!name) return alert('নাম লিখুন!');
  if(!phone || phone.length < 11) return alert('সঠিক মোবাইল নাম্বার দিন!');
  if(!address) return alert('ঠিকানা লিখুন!');
  if(!delivery) return alert('ডেলিভারি এরিয়া সিলেক্ট করুন!');
  if(!payment) return alert('পেমেন্ট মেথড সিলেক্ট করুন!');

  if(payment.value!== 'Cash on Delivery' &&!transactionId){
    return alert('bKash/Nagad Transaction ID দিন!');
  }

  var deliveryCharge = parseInt(delivery.value);
  var deliveryArea = deliveryCharge === 80? 'Inside Dhaka' : 'Outside Dhaka';
  var paymentMethod = payment.value;

  var orderData = {
    customerName: name,
    phone: phone,
    address: address,
    productName: product.name,
    productPrice: currentPrice,
    productColor: selectedColor || 'N/A',
    deliveryCharge: deliveryCharge,
    deliveryArea: deliveryArea,
    paymentMethod: paymentMethod,
    transactionId: transactionId || 'N/A',
    totalAmount: currentPrice + deliveryCharge,
    orderTime: new Date().toLocaleString('en-BD', {timeZone: 'Asia/Dhaka'}),
    orderStatus: "New"
  };

  database.ref('orders').push(orderData).then(function(){
    var msg = '✅ অর্ডার সফল!\n\nপ্রোডাক্ট: ' + product.name + '\nColor: ' + (selectedColor || 'N/A') + '\nপেমেন্ট: ' + paymentMethod;
    if(transactionId) msg += '\nTrxID: ' + transactionId;
    msg += '\nসর্বমোট: ' + (currentPrice + deliveryCharge) + ' TK\n\nআমরা শীঘ্রই কল দিব।';
    alert(msg);
    closeModal();
  }).catch(function(e){
    alert('❌ অর্ডার ফেইল: '+e.message);
  });
}

loadProduct();
</script>
</body>
  </html>
