<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - ABSAR UNIQUE TECH</title>
  <link rel="icon" href="logo.jpg">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
    :root{--primary:#ff6b00;--text:#333;--border:#e5e5e5;--soldout:#ff0000}
    body{background:#fff;color:var(--text);padding-bottom:70px}
   .header{position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 5px rgba(0,0,0,0.05)}
   .header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 15px}
   .back-btn{background:none;border:none;font-size:16px;font-weight:500;cursor:pointer;text-decoration:none;color:var(--text)}
   .logo{display:flex;align-items:center;gap:8px}
   .logo img{width:35px;height:35px;border-radius:8px}
   .logo span{font-weight:700;font-size:14px;color:var(--primary)}
   .cart{position:relative;font-size:22px;cursor:pointer}
   .cart span{position:absolute;top:-8px;right:-8px;background:var(--primary);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
   .gallery{background:#f5f5f5}
   .gallery img{width:100%;height:400px;object-fit:contain}
   .thumbs{display:flex;gap:10px;padding:15px;overflow-x:auto;background:#fff}
   .thumbs img{width:60px;height:60px;object-fit:cover;border:2px solid var(--border);border-radius:5px;cursor:pointer}
   .thumbs img.active{border-color:var(--primary)}
   .content{padding:20px}
   .breadcrumb{font-size:12px;color:#666;margin-bottom:15px}
   .breadcrumb a{color:var(--primary);text-decoration:none}
   .brand span{background:#ffeb3b;color:#000;padding:5px 15px;border-radius:3px;font-weight:700;font-size:12px}
   .name{font-size:22px;font-weight:700;margin:15px 0;line-height:1.3}
   .price{font-size:28px;font-weight:700;color:var(--primary);margin:15px 0}
   .color-sec{margin:15px 0}
   .color-sec label{font-weight:600;margin-bottom:10px;display:block}
   .colors{display:flex;gap:10px;flex-wrap:wrap}
   .color-btn{padding:8px 16px;border:2px solid var(--border);background:#fff;border-radius:5px;cursor:pointer;font-size:14px}
   .color-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
   .qty-sec{display:flex;align-items:center;gap:15px;margin:20px 0}
   .qty-box{display:flex;align-items:center;border:1px solid var(--border);border-radius:5px}
   .qty-box button{width:40px;height:40px;background:none;border:none;font-size:20px;cursor:pointer}
   .qty-box input{width:50px;height:40px;text-align:center;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);font-size:16px;font-weight:600}
   .btns{display:flex;gap:10px;margin:20px 0}
   .btn{flex:1;background:var(--primary);color:#fff;border:none;padding:14px;border-radius:5px;font-weight:700;font-size:15px;cursor:pointer}
   .btn:disabled{background:#ccc;cursor:not-allowed}
   .wishlist{display:flex;align-items:center;gap:8px;color:#666;margin:15px 0;cursor:pointer;font-size:14px}
   .cat-info{font-size:13px;color:#666;margin:10px 0}
   .desc{margin-top:30px;padding-top:20px;border-top:1px solid var(--border)}
   .desc h3{color:var(--primary);font-size:18px;margin-bottom:15px}
   .desc h4{font-size:16px;margin:15px 0 10px}
   .desc p{font-size:14px;line-height:1.6;color:#666;margin-bottom:10px}
   .desc ul{padding-left:20px;margin:10px 0}
   .desc li{font-size:14px;line-height:1.6;color:#666;margin-bottom:8px}
   .bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;z-index:1000}
   .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#666;font-size:11px}
   .nav-icon{font-size:22px;margin-bottom:3px}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <a href="index.html" class="back-btn">← Back</a>
      <div class="logo"><img src="logo.jpg" alt="AUT"><span>AUT</span></div>
      <div class="cart" onclick="location.href='cart.html'">🛒 <span id="cartCount">0</span></div>
    </div>
  </header>
  <main id="details"></main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Shop</span></a>
    <a href="#" class="nav-item"><span class="nav-icon">♡</span><span>Wishlist</span></a>
    <a href="cart.html" class="nav-item"><span class="nav-icon">🛒</span><span>Cart</span></a>
    <a href="login.html" class="nav-item"><span class="nav-icon">👤</span><span>Account</span></a>
  </nav>
  <script src="product.js"></script>
</body>
</html>
