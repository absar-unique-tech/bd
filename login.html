<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:90%;max-width:400px}
.login-box h2{color:#ff6b00;margin-bottom:20px;text-align:center}
.tabs{display:flex;gap:10px;margin-bottom:25px}
.tab{flex:1;padding:12px;border:2px solid #ddd;background:#fff;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.tab.active{border-color:#ff6b00;background:#fff3e6;color:#ff6b00}
.form-group{margin-bottom:15px}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:15px}
.form-group input:focus{outline:none;border-color:#ff6b00}
.login-box button{width:100%;padding:14px;background:#ff6b00;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
.back-link{text-align:center;margin-top:15px}
.back-link a{color:#ff6b00;text-decoration:none;font-weight:600}
.error{color:#ff3b30;font-size:13px;margin-top:-10px;margin-bottom:10px;display:none}
.logged-in{text-align:center;padding:20px}
.logged-in h3{font-size:22px;margin-bottom:10px;color:#333}
.logged-in p{color:#666;margin-bottom:20px}
.logout-btn{background:#ff3b30;color:#fff;padding:12px 30px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.form-section{display:none}
.form-section.active{display:block}
</style>
</head>
<body>
<div class="login-box" id="loginBox">

<!-- Login/Register Section -->
<div id="notLoggedIn">
<h2>👤 Customer Login</h2>
<div class="tabs">
<div class="tab active" onclick="switchTab('login',this)">Login</div>
<div class="tab" onclick="switchTab('register',this)">Register</div>
</div>

<!-- Login Form -->
<div class="form-section active" id="loginForm">
<div class="form-group">
<input type="text" id="loginName" placeholder="আপনার নাম *">
<div class="error" id="loginNameError">নাম লিখুন</div>
</div>
<div class="form-group">
<input type="text" id="loginEmail" placeholder="ইমেইল বা ফোন নাম্বার *">
<div class="error" id="loginEmailError">ইমেইল বা ফোন দিন</div>
</div>
<div class="form-group">
<input type="password" id="loginPassword" placeholder="পাসওয়ার্ড *">
<div class="error" id="loginPasswordError">পাসওয়ার্ড দিন</div>
</div>
<button onclick="loginUser()">Login করুন</button>
</div>

<!-- Register Form -->
<div class="form-section" id="registerForm">
<div class="form-group">
<input type="text" id="regName" placeholder="পুরো নাম *">
<div class="error" id="regNameError">নাম লিখুন</div>
</div>
<div class="form-group">
<input type="tel" id="regPhone" placeholder="ফোন নাম্বার *">
<div class="error" id="regPhoneError">ফোন নাম্বার দিন</div>
</div>
<div class="form-group">
<input type="email" id="regEmail" placeholder="ইমেইল *">
<div class="error" id="regEmailError">ইমেইল দিন</div>
</div>
<div class="form-group">
<input type="password" id="regPassword" placeholder="পাসওয়ার্ড *">
<div class="error" id="regPasswordError">পাসওয়ার্ড দিন</div>
</div>
<div class="form-group">
<input type="password" id="regConfirmPassword" placeholder="কনফার্ম পাসওয়ার্ড *">
<div class="error" id="regConfirmError">পাসওয়ার্ড মিলছে না</div>
</div>
<button onclick="registerUser()">Register করুন</button>
</div>

<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
</div>

<!-- Logged In Section -->
<div id="loggedIn" style="display:none">
<div class="logged-in">
<h3>Welcome, <span id="userDisplayName"></span>!</h3>
<p>আপনি সফলভাবে লগইন করেছেন</p>
<button class="logout-btn" onclick="logoutUser()">Logout</button>
<div class="back-link" style="margin-top:20px">
<a href="index.html">← Back to Home</a>
</div>
</div>
</div>

</div>

<script>
function checkLogin(){
  const user = localStorage.getItem('userName');
  if(user){
    document.getElementById('notLoggedIn').style.display = 'none';
    document.getElementById('loggedIn').style.display = 'block';
    document.getElementById('userDisplayName').textContent = user;
  } else {
    document.getElementById('notLoggedIn').style.display = 'block';
    document.getElementById('loggedIn').style.display = 'none';
  }
}

function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab + 'Form').classList.add('active');
}

function loginUser(){
  const name = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  let valid = true;

  if(!name){
    document.getElementById('loginNameError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('loginNameError').style.display = 'none';
  }

  if(!email){
    document.getElementById('loginEmailError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('loginEmailError').style.display = 'none';
  }

  if(!password){
    document.getElementById('loginPasswordError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('loginPasswordError').style.display = 'none';
  }

  if(!valid) return;

  // Login সেভ কর
  localStorage.setItem('userName', name);
  localStorage.setItem('userEmail', email);
  
  alert('✅ Login সফল!\n\nWelcome, ' + name);
  checkLogin();
  setTimeout(()=>{ window.location.href = 'index.html'; }, 1000);
}

function registerUser(){
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const confirmPassword = document.getElementById('regConfirmPassword').value.trim();

  let valid = true;

  if(!name){
    document.getElementById('regNameError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('regNameError').style.display = 'none';
  }

  if(!phone || phone.length < 11){
    document.getElementById('regPhoneError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('regPhoneError').style.display = 'none';
  }

  if(!email ||!email.includes('@')){
    document.getElementById('regEmailError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('regEmailError').style.display = 'none';
  }

  if(!password || password.length < 4){
    document.getElementById('regPasswordError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('regPasswordError').style.display = 'none';
  }

  if(password!== confirmPassword){
    document.getElementById('regConfirmError').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('regConfirmError').style.display = 'none';
  }

  if(!valid) return;

  // Registration সেভ কর
  localStorage.setItem('userName', name);
  localStorage.setItem('userEmail', email);
  localStorage.setItem('userPhone', phone);
  
  alert('✅ Registration সফল!\n\nWelcome, ' + name);
  checkLogin();
  setTimeout(()=>{ window.location.href = 'index.html'; }, 1000);
}

function logoutUser(){
  if(confirm('Logout করতে চান?')){
    localStorage.removeItem('userName');
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userPhone');
    alert('Logout সফল!');
    checkLogin();
  }
}

checkLogin();
</script>
</body>
</html>
