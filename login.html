<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:90%;max-width:400px}
.login-box h2{color:#ff6b00;margin-bottom:20px;text-align:center}
.login-box input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:6px;font-size:15px}
.login-box button{width:100%;padding:14px;background:#ff6b00;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
.back-link{text-align:center;margin-top:15px}
.back-link a{color:#ff6b00;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="login-box">
<h2>👤 Customer Login</h2>
<input type="text" id="userName" placeholder="আপনার নাম">
<input type="tel" id="userPhone" placeholder="মোবাইল নাম্বার">
<button onclick="login()">Login</button>
<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
</div>

<script>
function login(){
  const name = document.getElementById('userName').value.trim();
  const phone = document.getElementById('userPhone').value.trim();
  if(!name ||!phone){
    alert('নাম আর ফোন নাম্বার দিন!');
    return;
  }
  localStorage.setItem('userName', name);
  localStorage.setItem('userPhone', phone);
  alert('✅ Login সফল!');
  window.location = 'index.html';
}
</script>
</body>
</html>
