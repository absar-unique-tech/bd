<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;max-width:400px}
h2{text-align:center;margin-bottom:20px;color:#ff6b00}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:14px}
button{width:100%;padding:12px;background:#ff6b00;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;margin-top:10px;cursor:pointer}
button:hover{background:#e55f00}
button:disabled{background:#ccc;cursor:not-allowed}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;border-bottom:2px solid #ddd;cursor:pointer}
.tab.active{border-color:#ff6b00;color:#ff6b00;font-weight:700}
.form{display:none}
.form.active{display:block}
.error{color:#ff3b30;font-size:13px;margin-top:5px;text-align:center}
.back{text-align:center;margin-top:15px}
.back a{color:#ff6b00;text-decoration:none;font-size:14px}
.social-login{text-align:center;margin-top:20px}
.social-text{color:#999;font-size:13px;margin-bottom:12px}
.social-icons{display:flex;justify-content:center;gap:15px}
.social-btn{width:45px;height:45px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all.2s}
.social-btn:hover{transform:scale(1.1);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.social-btn img{width:22px;height:22px}
</style>
</head>
<body>
<div class="box">
  <h2>ABSAR UNIQUE TECH</h2>
  
  <div class="tabs">
    <div class="tab active" onclick="showTab('login',this)">Login</div>
    <div class="tab" onclick="showTab('register',this)">Register</div>
  </div>
  
  <div id="login" class="form active">
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPass" placeholder="Password" required>
    <div class="error" id="loginError"></div>
    <button onclick="handleLogin()" id="loginBtn">Login</button>
    
    <div class="social-login">
      <div class="social-text">Or login with</div>
      <div class="social-icons">
        <button class="social-btn" onclick="googleLogin()" title="Google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        </button>
        <button class="social-btn" onclick="facebookLogin()" title="Facebook">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/facebook.svg" alt="Facebook">
        </button>
      </div>
    </div>
  </div>
  
  <div id="register" class="form">
    <input type="text" id="regName" placeholder="Full Name" required>
    <input type="tel" id="regPhone" placeholder="Phone Number" required>
    <input type="email" id="regEmail" placeholder="Email" required>
    <input type="password" id="regPass" placeholder="Password (min 6 chars)" required>
    <div class="error" id="regError"></div>
    <button onclick="handleRegister()" id="regBtn">Register</button>
    
    <div class="social-login">
      <div class="social-text">Or sign up with</div>
      <div class="social-icons">
        <button class="social-btn" onclick="googleLogin()" title="Google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        </button>
        <button class="social-btn" onclick="facebookLogin()" title="Facebook">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/facebook.svg" alt="Facebook">
        </button>
      </div>
    </div>
  </div>
  
  <div class="back">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyCI39dQTYcZ76ROxUY73jYB3OZPfjsyegI",
  authDomain: "absar-unique-tech.firebaseapp.com",
  projectId: "absar-unique-tech",
  storageBucket: "absar-unique-tech.firebasestorage.app",
  messagingSenderId: "576285730220",
  appId: "1:576285730220:web:1d3cdf9cf3ddc4e00b4609",
  measurementId: "G-T77Z74DM83"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();
const facebookProvider = new FacebookAuthProvider();

window.showTab = function(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.querySelectorAll('.error').forEach(e=>e.textContent='');
  el.classList.add('active');
  document.getElementById(tab).classList.add('active');
}

// Google Login
window.googleLogin = async function(){
  try {
    const result = await signInWithPopup(auth, googleProvider);
    alert('✅ Google Login Success! Welcome ' + result.user.displayName);
    window.location.href = 'index.html';
  } catch(e){
    alert('❌ Google Error: ' + e.message);
  }
}

// Facebook Login
window.facebookLogin = async function(){
  try {
    const result = await signInWithPopup(auth, facebookProvider);
    alert('✅ Facebook Login Success! Welcome ' + result.user.displayName);
    window.location.href = 'index.html';
  } catch(e){
    alert('❌ Facebook Error: ' + e.message);
  }
}

window.handleLogin = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  if(!email ||!pass){
    errorEl.textContent = 'Please fill all fields';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  errorEl.textContent = '';
  
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    alert('✅ Login Success!');
    window.location.href = 'index.html';
  } catch(e){
    errorEl.textContent = e.message.replace('Firebase: ','');
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

window.handleRegister = async function(){
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const errorEl = document.getElementById('regError');
  const btn = document.getElementById('regBtn');
  
  if(!name ||!phone ||!email ||!pass){
    errorEl.textContent = 'Please fill all fields';
    return;
  }
  
  if(pass.length < 6){
    errorEl.textContent = 'Password must be at least 6 characters';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Registering...';
  errorEl.textContent = '';
  
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert('✅ Registration Success! Now login.');
    showTab('login', document.querySelectorAll('.tab')[0]);
    document.getElementById('loginEmail').value = email;
  } catch(e){
    errorEl.textContent = e.message.replace('Firebase: ','');
  }
  
  btn.disabled = false;
  btn.textContent = 'Register';
}
</script>
</body>
</html>
