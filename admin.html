<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel - ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#f5f5f5}
.container{max-width:1000px;margin:0 auto;padding:15px}

/* Login Screen */
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#ff6b00,#ff9500);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;padding:40px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.3);width:90%;max-width:400px;text-align:center}
.login-box h2{color:#ff6b00;margin-bottom:25px;font-size:26px}
.login-box input{width:100%;padding:15px;margin:15px 0;border:2px solid #e5e5e5;border-radius:10px;font-size:18px;text-align:center;letter-spacing:5px}
.login-box button{width:100%;padding:15px;background:#ff6b00;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-box button:hover{background:#e55f00}
.error{color:#ff3b30;font-size:14px;margin-top:10px;min-height:20px}

/* Admin Panel */
.admin-panel{display:none}
.header{background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;padding:20px;border-radius:12px;margin-bottom:20px;text-align:center}
.header h1{font-size:24px;font-weight:800}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.card h3{color:#ff6b00;margin-bottom:15px;font-size:18px}
input,textarea{width:100%;padding:12px;margin:8px 0;border:2px solid #e5e5e5;border-radius:8px;font-size:15px}
input:focus,textarea:focus{outline:none;border-color:#ff6b00}
button{padding:12px 24px;background:#ff6b00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
button:hover{background:#e55f00}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* Product List Horizontal Scroll */
.scroll-box{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e5e5e5;border-radius:10px}
.product-table{min-width:700px;width:100%}
.product-row{display:flex;align-items:center;padding:15px;border-bottom:1px solid #f0f0f0;background:#fff}
.product-row:last-child{border-bottom:none}
.product-img{width:60px;height:60px;object-fit:cover;border-radius:8px;margin-right:15px;flex-shrink:0}
.product-details{flex:1;min-width:300px;padding-right:15px}
.product-name{font-weight:700;font-size:16px;margin-bottom:5px}
.product-price{color:#ff6b00;font-weight:600;font-size:17px}
.product-stock{color:#666;font-size:13px;margin-top:3px}
.delete-wrap{width:100px;flex-shrink:0;text-align:center}
.delete-btn{background:#ff3b30;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer}
.delete-btn:hover{background:#e0352b}
.empty{text-align:center;padding:40px;color:#999}
.tab-bar{display:flex;gap:10px;margin-bottom:20px}
.tab-btn{flex:1;padding:14px;background:#fff;border:2px solid #e5e5e5;border-radius:10px;font-weight:700;color:#666;cursor:pointer}
.tab-btn.active{background:#ff6b00;color:#fff;border-color:#ff6b00}
.content{display:none}
.content.active{display:block}
.hint{background:#fff3cd;padding:12px;border-radius:8px;color:#856404;font-size:14px;margin-bottom:15px;border-left:4px solid #ffc107}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>ABSAR UNIQUE TECH</h2>
    <p style="color:#666;margin-bottom:20px">Enter Admin Password</p>
    <input type="password" id="adminPass" placeholder="••••" maxlength="4">
    <div class="error" id="loginError"></div>
    <button onclick="checkPassword()">Login to Admin Panel</button>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
<div class="container">
  <div class="header">
    <h1>ABSAR UNIQUE TECH</h1>
    <p style="font-size:14px;opacity:.9;margin-top:5px">Admin Panel</p>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('add',this)">Add Product</button>
    <button class="tab-btn" onclick="showTab('list',this)">Product List</button>
  </div>

  <div id="add" class="content active">
    <div class="card">
      <h3>Add New Product</h3>
      <div class="grid">
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price (৳)">
      </div>
      <div class="grid">
        <input type="number" id="pStock" placeholder="Stock Quantity">
        <input type="text" id="pImage" placeholder="Image URL">
      </div>
      <textarea id="pDesc" rows="3" placeholder="Product Description"></textarea>
      <button onclick="addProduct()" id="addBtn">Add Product</button>
    </div>
  </div>

  <div id="list" class="content">
    <div class="card">
      <h3>All Products</h3>
      <div class="hint">👉 মোবাইলে আঙুল দিয়ে ডানে-বামে টান দাও। পুরা নাম আর Delete বাটন দেখতে পাবা। YouTube এর মত।</div>
      <div class="scroll-box">
        <div class="product-table" id="productList">
          <div class="empty">Loading products...</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import { getDatabase, ref, push, onValue, remove } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCI39dQTYcZ76ROxUY73jYB3OZPfjsyegI",
  authDomain: "absar-unique-tech.firebaseapp.com",
  projectId: "absar-unique-tech",
  storageBucket: "absar-unique-tech.firebasestorage.app",
  messagingSenderId: "576285730220",
  appId: "1:576285730220:web:1d3cdf9cf3ddc4e00b4609"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Password Check
window.checkPassword = function(){
  const pass = document.getElementById('adminPass').value;
  const error = document.getElementById('loginError');
  
  if(pass === '3316'){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadProducts();
  } else {
    error.textContent = '❌ Wrong Password! Try again.';
    document.getElementById('adminPass').value = '';
  }
}

// Enter Key Support
document.getElementById('adminPass').addEventListener('keypress',function(e){
  if(e.key === 'Enter') checkPassword();
});

window.showTab = function(tab,el){
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab).classList.add('active');
  if(tab==='list') loadProducts();
}

window.addProduct = async function(){
  const name = document.getElementById('pName').value.trim();
  const price = document.getElementById('pPrice').value.trim();
  const stock = document.getElementById('pStock').value.trim();
  const image = document.getElementById('pImage').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  const btn = document.getElementById('addBtn');
  
  if(!name ||!price ||!stock ||!image){
    alert('❌ Please fill all fields');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Adding...';
  
  try {
    await push(ref(db,'products'),{
      name:name,
      price:Number(price),
      stock:Number(stock),
      image:image,
      desc:desc,
      created:Date.now()
    });
    alert('✅ Product Added Successfully');
    document.getElementById('pName').value='';
    document.getElementById('pPrice').value='';
    document.getElementById('pStock').value='';
    document.getElementById('pImage').value='';
    document.getElementById('pDesc').value='';
  } catch(e){
    alert('❌ Error: '+e.message);
  }
  
  btn.disabled = false;
  btn.textContent = 'Add Product';
}

window.deleteProduct = async function(id){
  if(!confirm('Delete this product?')) return;
  try {
    await remove(ref(db,'products/'+id));
    alert('✅ Product Deleted');
    loadProducts();
  } catch(e){
    alert('❌ Error: '+e.message);
  }
}

function loadProducts(){
  const list = document.getElementById('productList');
  onValue(ref(db,'products'),(snap)=>{
    list.innerHTML = '';
    if(!snap.exists()){
      list.innerHTML = '<div class="empty">No products yet. Add your first product!</div>';
      return;
    }
    
    snap.forEach(child=>{
      const p = child.val();
      const id = child.key;
      const row = document.createElement('div');
      row.className = 'product-row';
      row.innerHTML = `
        <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/60'">
        <div class="product-details">
          <div class="product-name">${p.name}</div>
          <div class="product-price">৳${p.price}</div>
          <div class="product-stock">Stock: ${p.stock} pcs | ${p.desc||'No description'}</div>
        </div>
        <div class="delete-wrap">
          <button class="delete-btn" onclick="deleteProduct('${id}')">Delete</button>
        </div>
      `;
      list.appendChild(row);
    });
  });
}
</script>
</body>
</html>
