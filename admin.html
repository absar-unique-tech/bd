<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel - Absar Unique Tech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f}
.login{max-width:400px;margin:100px auto;background:#fff;padding:40px;border-radius:18px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.login h1{text-align:center;margin-bottom:30px;font-size:28px}
.login input{width:100%;padding:14px;border:1px solid #d2d2d7;border-radius:10px;margin-bottom:16px;font-size:16px}
.login button{width:100%;padding:14px;background:#ff6b00;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login button:hover{background:#e55f00}
.panel{display:none}
header{background:#ff6b00;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:20px}
.logout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600}
.tabs{display:flex;background:#fff;border-bottom:1px solid #d2d2d7;overflow-x:auto}
.tab{padding:16px 24px;border:none;background:none;cursor:pointer;font-weight:600;color:#86868b;white-space:nowrap}
.tab.active{color:#ff6b00;border-bottom:3px solid #ff6b00}
.content{display:none;padding:20px;max-width:1200px;margin:0 auto}
.content.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-num{font-size:32px;font-weight:700;color:#ff6b00;margin-bottom:4px}
.stat-label{color:#86868b;font-size:14px}
.form{background:#fff;padding:24px;border-radius:12px;margin-bottom:24px}
.form h2{margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.form input,.form select,.form textarea{width:100%;padding:12px;border:1px solid #d2d2d7;border-radius:8px;font-family:inherit}
.form textarea{grid-column:1/-1;min-height:80px}
.btn-submit{grid-column:1/-1;padding:14px;background:#ff6b00;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:16px}
.btn-submit:hover{background:#e55f00}
.table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse}
th{background:#f5f5f7;padding:12px;text-align:left;font-weight:600;font-size:14px}
td{padding:12px;border-top:1px solid #f5f5f7}
td img{width:50px;height:50px;object-fit:cover;border-radius:8px}
.btn-del{background:#ff3b30;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.btn-del:hover{background:#e02e24}
.order-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.order-head{display:flex;justify-content:space-between;margin-bottom:12px}
.order-id{font-weight:700}
.status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.status.pending{background:#fff3e6;color:#ff6b00}
.order-items{color:#666;margin-bottom:8px;font-size:14px}
.order-total{font-weight:700;font-size:18px;color:#ff6b00;margin-bottom:8px}
.order-customer{font-size:14px;color:#666;line-height:1.6}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="login" id="loginScreen">
<h1>Admin Login</h1>
<input type="password" id="pass" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
<button onclick="login()">Login</button>
</div>

<div class="panel" id="panel">
<header>
<h1>Admin Panel</h1>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="tabs">
<button class="tab active" onclick="showTab('dash',this)">Dashboard</button>
<button class="tab" onclick="showTab('add',this)">Add Product</button>
<button class="tab" onclick="showTab('products',this)">Products</button>
<button class="tab" onclick="showTab('orders',this)">Orders</button>
</div>

<div class="content active" id="dash">
<div class="stats">
<div class="stat">
<div class="stat-num" id="statP">0</div>
<div class="stat-label">Total Products</div>
</div>
<div class="stat">
<div class="stat-num" id="statO">0</div>
<div class="stat-label">Total Orders</div>
</div>
</div>
</div>

<div class="content" id="add">
<form class="form" onsubmit="addProduct(event)">
<h2>Add New Product</h2>
<div class="form-grid">
<input type="text" id="pName" placeholder="Product Name *" required>
<select id="pCat" required>
<option value="">Select Category *</option>
<option value="charger">Charger</option>
<option value="cable">Cable</option>
<option value="powerbank">Power Bank</option>
<option value="earphone">Earphone</option>
<option value="headphone">Headphone</option>
<option value="phone">Phone</option>
<option value="watch">Watch</option>
<option value="accessories">Accessories</option>
</select>
<input type="text" id="pBrand" placeholder="Brand Name">
<input type="number" id="pPrice" placeholder="Price ৳ *" required>
<input type="number" id="pStock" placeholder="Stock Quantity *" required>
<input type="text" id="pImg" placeholder="Image URLs (comma separated) *" required>
<input type="text" id="pColor" placeholder="Colors (comma separated) e.g: red,blue,black">
<textarea id="pDesc" placeholder="Product Description *" required></textarea>
<input type="text" id="pFeat" placeholder="Features (comma separated)">
<button type="submit" class="btn-submit">Add Product</button>
</div>
</form>
</div>

<div class="content" id="products">
<div class="table">
<table id="pTable"></table>
</div>
</div>

<div class="content" id="orders">
<div id="orderList"></div>
</div>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
