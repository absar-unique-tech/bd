<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel - ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#f5f5f5;padding:20px}
.container{max-width:900px;margin:0 auto}
.header{background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;padding:25px;border-radius:12px;margin-bottom:25px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:800}
.logout{background:rgba(255,255,255,.2);padding:8px 16px;border-radius:8px;border:none;color:#fff;font-weight:600;cursor:pointer}
.logout:hover{background:rgba(255,255,255,.3)}
.card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.card h3{color:#ff6b00;margin-bottom:20px;font-size:20px}
input,textarea{width:100%;padding:12px;margin:8px 0;border:2px solid #e5e5e5;border-radius:8px;font-size:15px}
input:focus,textarea:focus{outline:none;border-color:#ff6b00}
button{padding:12px 24px;background:#ff6b00;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
button:hover{background:#e55f00}
button:disabled{background:#ccc}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* Product List Swipe */
.product-list{overflow-x:auto}
.product-item{position:relative;min-width:100%;background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:12px;overflow:hidden;transition:transform.3s}
.product-item.swipe{transform:translateX(-100px)}
.product-content{display:flex;align-items:center;padding:15px;gap:15px}
.product-img{width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0}
.product-info{flex:1}
.product-name{font-weight:700;font-size:16px;margin-bottom:4px}
.product-price{color:#ff6b00;font-weight:600;font-size:18px}
.product-stock{color:#666;font-size:13px}
.product-actions{position:absolute;right:0;top:0;bottom:0;width:100px;background:#ff3b30;display:flex;align-items:center;justify-content:center;transform:translateX(100px);transition:transform.3s}
.product-item.swipe.product-actions{transform:translateX(0)}
.delete-btn{background:none;border:none;color:#fff;font-weight:700;font-size:15px;padding:20px;cursor:pointer}
.empty{text-align:center;padding:40px;color:#999}
.user-info{background:#f0f9ff;padding:15px;border-radius:8px;margin-bottom:20px;border-left:4px solid #ff6b00}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>ABSAR UNIQUE TECH</h1>
      <p style="font-size:14px;opacity:.9">Admin Dashboard</p>
    </div>
    <button class="logout" onclick="handleLogout()">Logout</button>
  </div>

  <div class="user-info" id="userInfo">Checking login...</div>

  <div class="card">
    <h3>Add New Product</h3>
    <div class="grid">
      <input type="text" id="pName" placeholder="Product Name">
      <input type="number" id="pPrice" placeholder="Price (৳)">
    </div>
    <div class="grid">
      <input type="number" id="pStock" placeholder="Stock Quantity">
      <input type="text" id="pImage" placeholder="Image URL">
    </div>
    <textarea id="pDesc" rows="3" placeholder="Product Description"></textarea>
    <button onclick="addProduct()" id="addBtn">Add Product</button>
  </div>

  <div class="card">
    <h3>All Products - Swipe Left to Delete</h3>
    <div class="product-list" id="productList">
      <div class="empty">Loading products...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
import { getDatabase, ref, push, onValue, remove } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCI39dQTYcZ76ROxUY73jYB3OZPfjsyegI",
  authDomain: "absar-unique-tech.firebaseapp.com",
  projectId: "absar-unique-tech",
  storageBucket: "absar-unique-tech.firebasestorage.app",
  messagingSenderId: "576285730220",
  appId: "1:576285730220:web:1d3cdf9cf3ddc4e00b4609"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Login Check
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href = 'login.html';
  } else {
    document.getElementById('userInfo').innerHTML = `👋 Logged in as: <b>${user.email}</b>`;
    loadProducts();
  }
});

window.handleLogout = async function(){
  await signOut(auth);
  window.location.href = 'login.html';
}

window.addProduct = async function(){
  const name = document.getElementById('pName').value.trim();
  const price = document.getElementById('pPrice').value.trim();
  const stock = document.getElementById('pStock').value.trim();
  const image = document.getElementById('pImage').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  const btn = document.getElementById('addBtn');
  
  if(!name ||!price ||!stock ||!image){
    alert('❌ Please fill all fields');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Adding...';
  
  try {
    await push(ref(db,'products'),{
      name:name,
      price:Number(price),
      stock:Number(stock),
      image:image,
      desc:desc,
      created:Date.now()
    });
    alert('✅ Product Added Successfully');
    document.getElementById('pName').value='';
    document.getElementById('pPrice').value='';
    document.getElementById('pStock').value='';
    document.getElementById('pImage').value='';
    document.getElementById('pDesc').value='';
  } catch(e){
    alert('❌ Error: '+e.message);
  }
  
  btn.disabled = false;
  btn.textContent = 'Add Product';
}

window.deleteProduct = async function(id){
  if(!confirm('Delete this product?')) return;
  try {
    await remove(ref(db,'products/'+id));
    alert('✅ Product Deleted');
  } catch(e){
    alert('❌ Error: '+e.message);
  }
}

function loadProducts(){
  const list = document.getElementById('productList');
  onValue(ref(db,'products'),(snap)=>{
    list.innerHTML = '';
    if(!snap.exists()){
      list.innerHTML = '<div class="empty">No products yet. Add your first product!</div>';
      return;
    }
    
    snap.forEach(child=>{
      const p = child.val();
      const id = child.key;
      const item = document.createElement('div');
      item.className = 'product-item';
      item.innerHTML = `
        <div class="product-content">
          <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/70'">
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-price">৳${p.price}</div>
            <div class="product-stock">Stock: ${p.stock} pcs</div>
          </div>
        </div>
        <div class="product-actions">
          <button class="delete-btn" onclick="deleteProduct('${id}')">Delete</button>
        </div>
      `;
      
      // Mobile Swipe
      let startX = 0;
      item.addEventListener('touchstart',e=>{startX = e.touches[0].clientX});
      item.addEventListener('touchend',e=>{
        let diff = startX - e.changedTouches[0].clientX;
        if(diff > 50) item.classList.add('swipe');
        else item.classList.remove('swipe');
      });
      
      // Desktop Click
      item.addEventListener('click',e=>{
        if(e.target.classList.contains('delete-btn')) return;
        item.classList.toggle('swipe');
      });
      
      list.appendChild(item);
    });
  });
}
</script>
</body>
</html>
