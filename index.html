<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABSAR UNIQUE TECH</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5}
.header{background:#ff6b00;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:800;cursor:pointer}
.h-icons{display:flex;gap:20px}
.icon{cursor:pointer;position:relative;text-decoration:none;color:#fff}
.cart-count{position:absolute;top:-8px;right:-8px;background:#fff;color:#ff6b00;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.banner{margin:15px;border-radius:12px;overflow:hidden;position:relative;height:180px}
.banner img{width:100%;height:100%;object-fit:cover}
.banner-text{position:absolute;bottom:20px;left:20px;color:#fff}
.banner-text h2{font-size:24px;margin-bottom:5px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.banner-text p{font-size:14px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.search{padding:15px}
.search input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px}
.p-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.1);cursor:pointer;text-decoration:none;color:inherit}
.p-img{position:relative;padding-top:100%;background:#f8f9fa}
.p-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.soldout{position:absolute;top:8px;left:8px;background:#ff3b30;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700}
.brand{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px}
.p-info{padding:12px}
.p-name{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.3}
.p-price{font-size:16px;font-weight:800;color:#ff6b00}
.menu{position:fixed;top:0;left:-250px;width:250px;height:100vh;background:#fff;z-index:200;transition:left .3s;box-shadow:2px 0 10px rgba(0,0,0,.1)}
.menu.active{left:0}
.menu-h{background:#ff6b00;color:#fff;padding:20px}
.menu-h h3{font-size:18px}
.menu-list{padding:15px}
.menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;text-decoration:none;color:#1a1a1a;display:block}
.menu-item.admin{background:#fff3e6;color:#ff6b00;font-weight:700;border-radius:6px;padding:12px;margin-top:10px;text-align:center}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:199;display:none}
.overlay.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:10px 0}
.nav-item{text-decoration:none;color:#666;font-size:12px;text-align:center}
.nav-item.active{color:#ff6b00}
</style>
</head>
<body>
<div class="header">
<div class="logo" onclick="toggleMenu()">☰ ABSAR UNIQUE TECH</div>
<div class="h-icons">
<a href="login.html" class="icon">👤</a>
<a href="cart.html" class="icon">🛒<span class="cart-count" id="cartCount">0</span></a>
</div>
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1550009158-9ebf69173e03?w=800" alt="Banner">
<div class="banner-text">
<h2>100% Authentic</h2>
<p>Original Mobile Accessories</p>
</div>
</div>

<div class="search">
<input type="text" placeholder="Search products..." oninput="search(this.value)">
</div>

<div class="grid" id="grid"></div>

<div class="menu" id="menu">
<div class="menu-h"><h3>ABSAR UNIQUE TECH</h3></div>
<div class="menu-list">
<a href="#" class="menu-item" onclick="filter('all');toggleMenu()">All Products</a>
<a href="#" class="menu-item" onclick="filter('charger');toggleMenu()">Chargers</a>
<a href="#" class="menu-item" onclick="filter('cable');toggleMenu()">Cables</a>
<a href="#" class="menu-item" onclick="filter('powerbank');toggleMenu()">Power Banks</a>
<a href="#" class="menu-item" onclick="filter('earphone');toggleMenu()">Earphones</a>
<a href="admin.html" class="menu-item admin">Admin Panel</a>
</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="bottom-nav">
<a href="index.html" class="nav-item active">🏠<br>Home</a>
<a href="cart.html" class="nav-item">🛒<br>Cart</a>
<a href="login.html" class="nav-item">👤<br>Account</a>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
