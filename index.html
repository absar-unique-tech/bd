<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABSAR UNIQUE TECH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5}
.header{background:#ff6b00;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:10px}
.logo img{width:35px;height:35px;border-radius:8px;object-fit:cover;background:#fff}
.h-icons{display:flex;gap:20px}
.icon{cursor:pointer;position:relative;text-decoration:none;color:#fff;font-size:24px}
.cart-count{position:absolute;top:-8px;right:-8px;background:#fff;color:#ff6b00;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.banner{margin:15px;border-radius:12px;overflow:hidden;position:relative;height:180px}
.banner img{width:100%;height:100%;object-fit:cover}
.banner-text{position:absolute;bottom:20px;left:20px;color:#fff}
.banner-text h2{font-size:24px;margin-bottom:5px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.banner-text p{font-size:14px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.search{padding:15px}
.search input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px;padding-bottom:80px}
.p-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.1);display:flex;flex-direction:column}
.p-img{position:relative;padding-top:100%;background:#f8f9fa;cursor:pointer}
.p-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.soldout{position:absolute;top:8px;left:8px;background:#ff3b30;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700}
.brand{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px}
.p-info{padding:12px;flex:1;display:flex;flex-direction:column}
.p-name{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.3;cursor:pointer}
.p-price{font-size:16px;font-weight:800;color:#ff6b00;margin-bottom:10px}
.buy-btn{background:#ff6b00;color:#fff;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-top:auto}
.buy-btn:active{transform:scale(0.95)}
.menu{position:fixed;top:0;left:-250px;width:250px;height:100vh;background:#fff;z-index:200;transition:left .3s;box-shadow:2px 0 10px rgba(0,0,0,.1)}
.menu.active{left:0}
.menu-h{background:#ff6b00;color:#fff;padding:20px;display:flex;align-items:center;gap:10px}
.menu-h img{width:40px;height:40px;border-radius:8px;background:#fff}
.menu-h h3{font-size:18px}
.menu-list{padding:15px}
.menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;text-decoration:none;color:#1a1a1a;display:block}
.menu-item.admin{background:#fff3e6;color:#ff6b00;font-weight:700;border-radius:6px;padding:12px;margin-top:10px;text-align:center}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:199;display:none}
.overlay.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:10px 0;z-index:50}
.nav-item{text-decoration:none;color:#666;font-size:12px;text-align:center}
.nav-item.active{color:#ff6b00}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:15px}
.modal.active{display:flex}
.order-form{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.order-form h3{margin-bottom:15px;color:#ff6b00;font-size:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:14px}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:15px}
.delivery-box{border:2px solid #eee;border-radius:8px;padding:12px;margin-bottom:15px}
.radio-row{display:flex;align-items:center;margin-bottom:10px;cursor:pointer}
.radio-row input{width:auto;margin-right:10px}
.total-box{background:#fff3e6;padding:15px;border-radius:8px;margin-bottom:15px}
.total-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:15px}
.total-row.final{font-weight:800;font-size:18px;color:#ff6b00;border-top:2px dashed #ddd;padding-top:8px}
.confirm-btn{background:#ff6b00;color:#fff;padding:14px;border:none;border-radius:8px;width:100%;font-size:16px;font-weight:700;cursor:pointer}
.close-btn{background:#eee;color:#333;padding:12px;border:none;border-radius:8px;width:100%;font-size:15px;margin-top:10px;cursor:pointer}
</style>
</head>
<body>
<div class="header">
<div class="logo" onclick="toggleMenu()">
<img src="logo.jpg" alt="Logo">
ABSAR UNIQUE TECH
</div>
<div class="h-icons">
<a href="login.html" class="icon">👤</a>
<a href="cart.html" class="icon">🛒<span class="cart-count" id="cartCount">0</span></a>
</div>
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1550009158-9ebf69173e03?w=800" alt="Banner">
<div class="banner-text">
<h2>100% Authentic</h2>
<p>Original Mobile Accessories</p>
</div>
</div>

<div class="search">
<input type="text" placeholder="Search products..." oninput="search(this.value)">
</div>

<div class="grid" id="grid">
<div style="grid-column:1/-1;text-align:center;padding:40px;color:#666">Loading...</div>
</div>

<div class="menu" id="menu">
<div class="menu-h">
<img src="logo.jpg" alt="Logo">
<h3>ABSAR UNIQUE TECH</h3>
</div>
<div class="menu-list">
<a href="#" class="menu-item" onclick="filter('all');toggleMenu()">All Products</a>
<a href="#" class="menu-item" onclick="filter('charger');toggleMenu()">Chargers</a>
<a href="#" class="menu-item" onclick="filter('cable');toggleMenu()">Cables</a>
<a href="#" class="menu-item" onclick="filter('powerbank');toggleMenu()">Power Banks</a>
<a href="#" class="menu-item" onclick="filter('earphone');toggleMenu()">Earphones</a>
<a href="admin.html" class="menu-item admin">Admin Panel</a>
</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="bottom-nav">
<a href="index.html" class="nav-item active">🏠<br>Home</a>
<a href="cart.html" class="nav-item">🛒<br>Cart</a>
<a href="login.html" class="nav-item">👤<br>Account</a>
</div>

<div class="modal" id="orderModal">
<div class="order-form">
<h3>অর্ডার কনফার্ম করুন</h3>
<div class="form-group">
<label>প্রোডাক্ট:</label>
<input type="text" id="orderProduct" readonly>
</div>
<div class="form-group">
<label>আপনার নাম *</label>
<input type="text" id="orderName" placeholder="পুরো নাম লিখুন">
</div>
<div class="form-group">
<label>মোবাইল নাম্বার *</label>
<input type="tel" id="orderPhone" placeholder="01XXXXXXXXX">
</div>
<div class="form-group">
<label>সম্পূর্ণ ঠিকানা *</label>
<input type="text" id="orderAddress" placeholder="বাসা, রোড, এলাকা, জেলা">
</div>
<div class="delivery-box">
<label style="font-weight:700;margin-bottom:10px;display:block">ডেলিভারি এরিয়া সিলেক্ট করুন *</label>
<label class="radio-row">
<input type="radio" name="delivery" value="80" onchange="updateTotal()">
ঢাকার ভিতরে - 80 টাকা
</label>
<label class="radio-row">
<input type="radio" name="delivery" value="150" onchange="updateTotal()">
ঢাকার বাইরে - 150 টাকা
</label>
</div>
<div class="total-box">
<div class="total-row">
<span>প্রোডাক্ট মূল্য:</span>
<span id="productPrice">0 TK</span>
</div>
<div class="total-row">
<span>ডেলিভারি চার্জ:</span>
<span id="deliveryCharge">0 TK</span>
</div>
<div class="total-row final">
<span>সর্বমোট:</span>
<span id="totalAmount">0 TK</span>
</div>
</div>
<button class="confirm-btn" onclick="submitOrder()">অর্ডার কনফার্ম করুন</button>
<button class="close-btn" onclick="closeModal()">বাতিল</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
