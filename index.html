<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5}
.header{background:#ff6b00;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:10px}
.logo img{width:35px;height:35px;border-radius:8px;object-fit:cover;background:#fff}
.h-icons{display:flex;gap:20px}
.icon{cursor:pointer;position:relative;text-decoration:none;color:#fff;font-size:24px}
.cart-count{position:absolute;top:-8px;right:-8px;background:#fff;color:#ff6b00;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.banner{margin:15px;border-radius:12px;overflow:hidden;position:relative;height:180px}
.banner img{width:100%;height:100%;object-fit:cover}
.banner-text{position:absolute;bottom:20px;left:20px;color:#fff}
.banner-text h2{font-size:24px;margin-bottom:5px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.banner-text p{font-size:14px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.search{padding:15px}
.search input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px;padding-bottom:80px}
.p-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.1);display:flex;flex-direction:column}
.p-img{position:relative;padding-top:100%;background:#f8f9fa;cursor:pointer}
.p-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.soldout{position:absolute;top:8px;left:8px;background:#ff3b30;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700}
.brand{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px}
.p-info{padding:12px;flex:1;display:flex;flex-direction:column}
.p-name{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.3;cursor:pointer}
.p-price{font-size:16px;font-weight:800;color:#ff6b00;margin-bottom:10px}
.buy-btn{background:#ff6b00;color:#fff;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-top:auto}
.buy-btn:active{transform:scale(0.95)}
.menu{position:fixed;top:0;left:-250px;width:250px;height:100vh;background:#fff;z-index:200;transition:left .3s;box-shadow:2px 0 10px rgba(0,0,0,.1)}
.menu.active{left:0}
.menu-h{background:#ff6b00;color:#fff;padding:20px;display:flex;align-items:center;gap:10px}
.menu-h img{width:40px;height:40px;border-radius:8px;background:#fff}
.menu-h h3{font-size:18px}
.menu-list{padding:15px}
.menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;text-decoration:none;color:#1a1a1a;display:block}
.menu-item.admin{background:#fff3e6;color:#ff6b00;font-weight:700;border-radius:6px;padding:12px;margin-top:10px;text-align:center}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:199;display:none}
.overlay.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:10px 0;z-index:50}
.nav-item{text-decoration:none;color:#666;font-size:12px;text-align:center}
.nav-item.active{color:#ff6b00}
