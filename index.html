<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Absar Unique Tech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f}
header{background:rgba(255,255,255,.8);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;border-bottom:1px solid #d2d2d7}
.nav{max-width:1200px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
.menu-btn{width:40px;height:40px;border:none;background:#f5f5f7;border-radius:50%;cursor:pointer;font-size:20px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#1d1d1f}
.logo img{width:36px;height:36px;border-radius:8px;object-fit:cover}
.logo span{font-size:18px;font-weight:600}
.search{flex:1;max-width:400px;position:relative}
.search input{width:100%;padding:10px 16px;border:none;background:#f5f5f7;border-radius:10px;font-size:15px}
.cart{position:relative}
.cart-btn{width:40px;height:40px;border-radius:50%;background:#f5f5f7;display:flex;align-items:center;justify-content:center;text-decoration:none;color:#1d1d1f;font-size:18px}
.cart-count{position:absolute;top:-4px;right:-4px;background:#ff3b30;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:600}
.side-menu{position:fixed;left:-280px;top:0;width:280px;height:100vh;background:#fff;z-index:200;transition:.3s;box-shadow:2px 0 20px rgba(0,0,0,.1)}
.side-menu.active{left:0}
.menu-header{padding:20px;border-bottom:1px solid #d2d2d7;display:flex;align-items:center;gap:10px}
.menu-header img{width:40px;height:40px;border-radius:8px;object-fit:cover}
.menu-header span{font-size:18px;font-weight:600}
.menu-item{padding:16px 20px;border-bottom:1px solid #f5f5f7;cursor:pointer}
.menu-item:hover{background:#f5f5f7}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none}
.overlay.active{display:block}
.hero{max-width:1200px;margin:20px auto;padding:0 20px}
.hero img{width:100%;border-radius:18px}
.filters{max-width:1200px;margin:20px auto;padding:0 20px;display:flex;gap:8px;overflow-x:auto}
.filter{padding:8px 16px;border:none;background:#fff;border-radius:20px;white-space:nowrap;cursor:pointer;font-size:14px}
.filter.active{background:#1d1d1f;color:#fff}
.grid{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.p-card{background:#fff;border-radius:18px;overflow:hidden;text-decoration:none;color:#1d1d1f}
.p-img{aspect-ratio:1;position:relative;background:#f5f5f7}
.p-img img{width:100%;height:100%;object-fit:cover}
.soldout{position:absolute;top:8px;left:8px;background:#ff3b30;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600}
.brand{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;padding:4px 8px;border-radius:6px;font-size:11px}
.p-info{padding:12px}
.p-name{font-size:14px;font-weight:500;margin-bottom:4px;height:40px;overflow:hidden}
.p-price{font-size:16px;font-weight:700;color:#007aff}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
</style>
</head>
<body>
<header>
<div class="nav">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<a href="index.html" class="logo">
  <img src="logo.jpg" alt="Logo">
  <span>ABSAR UNIQUE TECH</span>
</a>
<div class="search"><input type="text" placeholder="Search products..." onkeyup="search(this.value)"></div>
<div class="cart">
<a href="cart.html" class="cart-btn">🛒</a>
<span class="cart-count" id="cartCount">0</span>
</div>
</div>
</header>
