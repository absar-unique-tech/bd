<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Orders - ABSAR UNIQUE TECH</title>
<style>
:root{--primary:#ff6b00;--dark:#1a1a1a;--gray:#f5f5f5}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:var(--gray)}
.header{background:linear-gradient(135deg,var(--primary),#ff8533);color:#fff;padding:15px;text-align:center;font-size:18px;font-weight:700;position:sticky;top:0;z-index:100}
.container{padding:15px;padding-bottom:80px}
.order-card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;gap:12px}
.order-card img{width:70px;height:70px;object-fit:cover;border-radius:8px;background:#f5f5f5}
.order-info{flex:1}
.order-name{font-weight:600;font-size:15px;margin-bottom:4px;line-height:1.3}
.order-price{color:var(--primary);font-weight:800;font-size:16px}
.order-date{font-size:12px;color:#666;margin:4px 0}
.order-color{font-size:12px;color:#666}
.order-phone{font-size:12px;color:#666}
.status{background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;display:inline-block;margin-top:4px}
.status.pending{background:#fff3e0;color:#f57c00}
.status.shipped{background:#e3f2fd;color:#1976d2}
.status.delivered{background:#e8f5e9;color:#2e7d32}
.empty{text-align:center;padding:60px 20px;color:#666}
.back-btn{position:fixed;bottom:20px;left:15px;right:15px;background:var(--primary);color:#fff;padding:14px;border:none;border-radius:8px;font-weight:700;text-align:center;text-decoration:none}
.loading{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>
<div class="header">📦 My Orders</div>
<div class="container" id="orderList">
<div class="loading">Loading orders...</div>
</div>
<a href="index.html" class="back-btn">← Back to Home</a>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import { getDatabase, ref, query, orderByChild, equalTo, onValue } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCI39dQTYcZ76ROxUY73jYB3OZPfjsyegI",
  authDomain: "absar-unique-tech.firebaseapp.com",
  databaseURL: "https://absar-unique-tech-default-rtdb.firebaseio.com",
  projectId: "absar-unique-tech",
  storageBucket: "absar-unique-tech.firebasestorage.app",
  messagingSenderId: "576285730220",
  appId: "1:576285730220:web:1d3cdf9cf3ddc4e00b4609"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let orderList = document.getElementById('orderList');

// ✅ User এর Phone Number দিয়ে Filter কর
const userPhone = localStorage.getItem('userPhone');

if(!userPhone){
  orderList.innerHTML = '<div class="empty">আপনি এখনো Login করেননি<br><br><a href="login.html" style="color:#ff6b00">Login করুন</a></div>';
} else {
  // Realtime Database থেকে User এর Order Load কর
  const ordersRef = ref(db, 'orders');
  
  onValue(ordersRef, (snapshot) => {
    let userOrders = [];
    
    snapshot.forEach(child => {
      const order = child.val();
      // Phone Number মিললে দেখাবে
      if(order.phone === userPhone){
        userOrders.push({id: child.key,...order});
      }
    });
    
    if(userOrders.length === 0){
      orderList.innerHTML = '<div class="empty">আপনি এখনো কোনো অর্ডার করেননি 🛒<br><br>প্রোডাক্ট কিনে এখানে দেখুন</div>';
    } else {
      // Latest Order আগে দেখাবে
      userOrders.reverse();
      
      let html = '';
      userOrders.forEach(order => {
        const statusClass = order.orderStatus === 'New' ? 'pending' : 
                           order.orderStatus === 'Shipped' ? 'shipped' : 
                           order.orderStatus === 'Delivered' ? 'delivered' : 'pending';
        
        html += `
          <div class="order-card">
            <img src="${order.productImage || 'https://via.placeholder.com/70'}" alt="${order.productName}" onerror="this.src='https://via.placeholder.com/70'">
            <div class="order-info">
              <div class="order-name">${order.productName}</div>
              <div class="order-color">Color: ${order.productColor || 'N/A'}</div>
              <div class="order-phone">Phone: ${order.phone}</div>
              <div class="order-price">৳${order.totalAmount}</div>
              <div class="order-date">📅 ${order.orderTime}</div>
              <span class="status ${statusClass}">${order.orderStatus || 'Pending'}</span>
            </div>
          </div>
        `;
      });
      orderList.innerHTML = html;
    }
  }, (error) => {
    orderList.innerHTML = '<div class="empty">Error loading orders<br>' + error.message + '</div>';
  });
}
</script>
</body>
</html>
